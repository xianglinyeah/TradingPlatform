[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
markers =
    unit: Unit tests (fast, isolated, no external dependencies)
    integration: Integration tests (medium speed, component interaction)
    functional: Functional tests (slow, end-to-end, requires environment)
    slow: Slow running tests (can be skipped during development)
    grpc: Tests requiring gRPC server connection
