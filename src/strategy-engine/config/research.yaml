# strategy_engine Research Configuration (Local Backtesting)

mode: research

# Data configuration
parquet_path: D:/TradingPlatform/data/minute/1min
symbols:
  - 600000.SH
start_date: "20230101"
end_date: "20231231"

# Multi-strategy configuration
strategies:
  # Main strategy: Moving Average with stop loss/take profit
  - name: ma_research
    class: MovingAverageStrategy
    enabled: true
    symbols:
      - 600000.SH
    params:
      ema_period: 10
      buy_threshold: -0.005
      stop_loss_pct: -0.008
      take_profit_pct: 0.012
      quantity: 100
      max_position: 1000

# Account configuration
initial_capital: 1000000
commission_rate: 0.0003
