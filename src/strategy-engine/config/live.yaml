# strategy_engine production (live) configuration for Kubernetes.

mode: live

# Kafka configuration (k8s service DNS)
kafka_brokers: kafka.infrastructure:9092
kafka_topic: market.data
kafka_group_id: strategy_engine_live

# Multi-strategy configuration
# Control whether a strategy is started via enabled: true/false
#
# Symbol sources (mutually exclusive; explicit list wins):
#   universe_id:  resolve membership from market_ref.universe_member at startup
#                 (requires UNIVERSE_PG_CONN env var pointing to PostgreSQL)
#   symbols:      explicit list (legacy; still supported for backward compat)
strategies:
  # Strategy 1: MA main strategy - trades a universe (resolved from market_ref)
  - name: ma_main
    class: MovingAverageStrategy
    enabled: true
    universe_id: csi300   # ~300 symbols resolved from PostgreSQL at startup
    params:
      ema_period: 10
      buy_threshold: -0.005
      stop_loss_pct: -0.008
      take_profit_pct: 0.012
      quantity: 100
      max_position: 1000

  # Strategy 2: MA fast strategy - more sensitive parameters (example, currently disabled)
  - name: ma_fast
    class: MovingAverageStrategy
    enabled: false
    symbols:
      - 000001.SZ
    params:
      ema_period: 5
      buy_threshold: -0.003
      stop_loss_pct: -0.005
      take_profit_pct: 0.008
      quantity: 200
      max_position: 500

  # Strategy 3: MA slow strategy - more conservative parameters (example, currently disabled)
  - name: ma_slow
    class: MovingAverageStrategy
    enabled: false
    symbols:
      - 600519.SH
    params:
      ema_period: 20
      buy_threshold: -0.01
      stop_loss_pct: -0.015
      take_profit_pct: 0.02
      quantity: 50
      max_position: 500

  # Strategy 4: Test strategy - used to test the place order API (currently disabled)
  # WARNING: This strategy buys on every received K-line, for testing only
  - name: test_buy_every_bar
    class: BuyEveryBarStrategy
    enabled: false
    symbols:
      - 000001.SZ
    params:
      quantity: 100       # Buy 100 shares each time
      max_position: 1000  # Maximum position 1000 shares

# Execution configuration (gRPC to ExecutionService)
executor: grpc
execution_service_address: execution-service:8084
session_id: live-session-k8s

# Account configuration
initial_capital: 1000000
commission_rate: 0.0003
