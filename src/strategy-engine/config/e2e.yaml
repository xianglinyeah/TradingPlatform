# strategy_engine Local Live Trading Configuration
# For local development debugging and integration testing
# Can also be used for unit testing (needs to support both live and research modes)

mode: live

# Data configuration (only for research mode)
parquet_path: D:/TradingPlatform/data/minute/1min
symbols:
  - 600000.SH
start_date: "20230101"
end_date: "20230115"

# Kafka configuration (for live mode)
# In K8s environment use kafka.infrastructure:9092
kafka_brokers: kafka.infrastructure:9092
kafka_topic: market.data
kafka_group_id: strategy_engine_e2e

# Multi-strategy configuration
strategies:
  # Strategy 1: MA main strategy - trades Shanghai Pudong Development Bank
  - name: ma_main
    class: MovingAverageStrategy
    enabled: true
    symbols:
      - 600000.SH
    params:
      ema_period: 10
      buy_threshold: -0.005
      stop_loss_pct: -0.008
      take_profit_pct: 0.012
      quantity: 100
      max_position: 1000

  # Strategy 2: BuyEveryBar - test strategy that buys on every minute bar
  - name: test_buy_every_bar
    class: BuyEveryBarStrategy
    enabled: true
    symbols:
      - 600000.SH
    params:
      quantity: 100
      max_position: 1000

# Execution configuration (locally connect to Docker ExecutionService)
executor: grpc
execution_service_address: execution-service:8084
session_id: live-session-e2e

# Account configuration
initial_capital: 1000000
commission_rate: 0.0003
