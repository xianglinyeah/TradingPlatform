# Strategy engine E2E / smoke-test configuration.
#
# This file is intentionally minimal: it lists ONLY the strategies the smoke
# test relies on. Adding new strategies to live.yaml does NOT require updating
# this file. Smoke-test trade-count assertions assume EMA-only behavior.
#
# Switch into this config via:  py dev.py switch e2e   (or `py dev.py test-smoke`)

mode: live

# Data configuration (only for research mode)
parquet_path: D:/TradingPlatform/data/minute/1min
symbols:
  - 600000.SH
start_date: "20230101"
end_date: "20230115"

# Kafka configuration (for live mode)
kafka_brokers: kafka.infrastructure:9092
kafka_topic: market.data
kafka_group_id: strategy_engine_e2e

# E2E strategies — only EMA. Do NOT add other strategies here; keep this file
# minimal so smoke-test assertions remain stable as live.yaml grows.
strategies:
  - name: ma_main
    class: MovingAverageStrategy
    enabled: true
    symbols:
      - 600000.SH
    params:
      ema_period: 10
      buy_threshold: -0.005
      stop_loss_pct: -0.008
      take_profit_pct: 0.012
      quantity: 100
      max_position: 1000

# Execution configuration
executor: grpc
execution_service_address: execution-service:8084
session_id: live-session-e2e

# Account configuration
initial_capital: 1000000
commission_rate: 0.0003
