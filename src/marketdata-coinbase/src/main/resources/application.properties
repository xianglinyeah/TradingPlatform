# Coinbase Advanced Trade WebSocket endpoint
coinbase.ws.url=wss://advanced-trade-ws.coinbase.com

# Comma-separated product IDs
coinbase.product.ids=BTC-USD

# CDP credentials (prefer env vars; these are fallbacks)
coinbase.auth.api-key=${COINBASE_API_KEY}
coinbase.auth.signing-key-path=${COINBASE_SIGNING_KEY_PATH}
coinbase.auth.jwt-ttl-seconds=120
coinbase.auth.jwt-refresh-before-exp-seconds=60

# Heartbeat expectations. Threshold bumped to 8s (from a 3s default) — over
# the local SOCKS5 proxy hop, first-heartbeat-after-(re)connect consistently
# lands around 3-4s, which was tripping a 3s threshold on the very connection
# attempt meant to recover from the last timeout.
coinbase.heartbeat.expected-interval-ms=1000
coinbase.heartbeat.missed-threshold=8

# Reconnect backoff (disconnect / heartbeat-timeout recovery)
coinbase.reconnect.initial-backoff-ms=1000
coinbase.reconnect.max-backoff-ms=30000

# Disruptor
disruptor.ring-buffer-size=8192
disruptor.wait-strategy=yielding

# OrderBook
orderbook.max-updates-per-event=8192
orderbook.snapshot-log-interval-ms=1000
orderbook.snapshot-log-depth=10

# WebSocket frame / HTTP handshake response size cap (bytes). Snapshots for
# liquid products can be large.
coinbase.ws.max-frame-bytes=8388608

# Outbound proxy (optional). type = socks5 | http
coinbase.proxy.enabled=true
coinbase.proxy.type=socks5
coinbase.proxy.host=127.0.0.1
coinbase.proxy.port=10808

# Latency instrumentation
metrics.latency-log-interval-ms=10000

# Raw WS frame recording (for replay tests). Off by default.
recording.enabled=false
recording.dir=recordings

# Chronicle Queue publishing (Process A's downstream exit).
# Per-venue queue: one directory per venue, single writer per queue.
venue=COINBASE
chronicle.publish.enabled=true
chronicle.queue.dir=queues/md-coinbase
