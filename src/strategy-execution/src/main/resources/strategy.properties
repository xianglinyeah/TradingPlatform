# Market data queue to consume (Process A's per-venue output).
# Relative paths resolve from the working directory; override with -Dmd.queue.dir=...
md.queue.dir=../marketdata-coinbase/queues/md-coinbase
# start = replay whole retained queue (rebuilds book state from the day's
# snapshots; converges to live). end = new documents only.
md.tail-from=start

# Imbalance signal: ratio = sum(top-N bid qty) / sum(top-N ask qty)
# BUY at ratio >= threshold, SELL at ratio <= 1/threshold.
imbalance.levels=5
imbalance.threshold=2.0
signal.cooldown-ms=2000
# Docs older than this update the book but never signal (replay/catchup guard)
signal.max-doc-age-ms=5000

# Execution stub
order.qty=0.001
risk.max-orders-per-minute=30
risk.max-abs-position=0.01
orders.dir=orders

# Signal audit queue (this process is its single writer)
audit.queue.dir=queues/signals-audit

disruptor.ring-buffer-size=8192
metrics.stats-log-interval-ms=10000

# Time source: wall = system clock (live/paper trading, default).
# stream = docs' own recvTs (backtest replay of an archived queue): cooldown
# and risk windows follow historical time, doc-age gating is off, and
# draining the queue ends the run. Same binary either way.
clock.mode=wall

# Latency recording starts this long after the tailer reaches the live queue
# tail (excludes startup replay and JIT warmup from the cumulative histograms).
latency.warmup-ms=60000
# Shutdown latency report (percentile tables) is written here.
metrics.reports-dir=reports

# Simulated execution (paper trading). Orders fill by walking the local book
# sim.latency-ms AFTER the signal (imbalance predicts adverse moves — naive
# same-tick fills are systematically optimistic). Haircut scales displayed
# level size (you never get all you see). Fee = your actual taker tier;
# 60bps is the placeholder — check your Coinbase Advanced fee schedule.
# These two knobs (latency, haircut) are what real-money calibration tunes.
sim.latency-ms=15
sim.fee-bps=60
sim.size-haircut=0.5
