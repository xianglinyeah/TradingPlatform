---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-status-exporter
  namespace: infrastructure
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-status-exporter
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-status-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-status-exporter
subjects:
  - kind: ServiceAccount
    name: k8s-status-exporter
    namespace: infrastructure
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-status-exporter-script
  namespace: infrastructure
data:
  exporter.py: |
    """K8s pod status exporter for Prometheus.
    Queries the k8s API for pod phases, readiness, and restart counts.
    Serves on :9309/metrics.
    """
    import http.server
    import json
    import os
    import ssl
    import threading
    import time
    import urllib.request

    K8S_API = "https://kubernetes.default.svc/api/v1/pods"
    NAMESPACES = os.getenv("WATCH_NAMESPACES", "trading-platform,infrastructure").split(",")
    PORT = int(os.getenv("EXPORTER_PORT", "9309"))
    INTERVAL = int(os.getenv("SCRAPE_INTERVAL", "15"))
    _cached = "# initial collection\n"

    def collect():
        global _cached
        lines = []
        try:
            with open("/var/run/secrets/kubernetes.io/serviceaccount/token") as f:
                token = f.read().strip()
            ctx = ssl.create_default_context()
            ctx.load_verify_locations(
                cafile="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
            )
            req = urllib.request.Request(
                K8S_API, headers={"Authorization": f"Bearer {token}"}
            )
            resp = urllib.request.urlopen(req, context=ctx, timeout=10)
            data = json.loads(resp.read())

            lines.append("# HELP kube_pod_status_phase Pod phase (1 if current)")
            lines.append("# TYPE kube_pod_status_phase gauge")
            lines.append("# HELP kube_pod_ready Pod ready (1 if all containers ready)")
            lines.append("# TYPE kube_pod_ready gauge")
            lines.append("# HELP kube_pod_container_restarts_total Container restart count")
            lines.append("# TYPE kube_pod_container_restarts_total counter")
            lines.append("# HELP kube_pod_info Pod metadata for table display")
            lines.append("# TYPE kube_pod_info gauge")

            phases = ("Running", "Pending", "Failed", "Succeeded", "Unknown")

            for pod in data.get("items", []):
                ns = pod["metadata"]["namespace"]
                if ns not in NAMESPACES:
                    continue
                name = pod["metadata"]["name"]
                status = pod.get("status", {})
                phase = status.get("phase", "Unknown")
                cstats = status.get("containerStatuses", [])
                ready_c = sum(1 for c in cstats if c.get("ready", False))
                total_c = len(cstats)

                for ph in phases:
                    v = 1 if phase == ph else 0
                    lines.append(
                        f'kube_pod_status_phase{{namespace="{ns}",pod="{name}",phase="{ph}"}} {v}'
                    )

                is_ready = 1 if ready_c == total_c and total_c > 0 else 0
                lines.append(
                    f'kube_pod_ready{{namespace="{ns}",pod="{name}"}} {is_ready}'
                )
                lines.append(
                    f'kube_pod_info{{namespace="{ns}",pod="{name}",phase="{phase}",'
                    f'ready="{ready_c}/{total_c}"}} 1'
                )

                for c in cstats:
                    rc = c.get("restartCount", 0)
                    cname = c.get("name", "?")
                    lines.append(
                        f'kube_pod_container_restarts_total{{namespace="{ns}",'
                        f'pod="{name}",container="{cname}"}} {rc}'
                    )

        except Exception as e:
            lines.append(f"# collect error: {e}")

        _cached = "\n".join(lines) + "\n"

    class Handler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/metrics":
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; version=0.0.4")
                self.end_headers()
                self.wfile.write(_cached.encode())
            else:
                self.send_response(404)
                self.end_headers()

        def log_message(self, *a):
            pass

    def poll():
        while True:
            try:
                collect()
            except Exception as e:
                print(f"[k8s-status] error: {e}", flush=True)
            time.sleep(INTERVAL)

    if __name__ == "__main__":
        print(f"[k8s-status] port={PORT} namespaces={NAMESPACES}", flush=True)
        collect()
        threading.Thread(target=poll, daemon=True).start()
        http.server.HTTPServer(("0.0.0.0", PORT), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-status-exporter
  namespace: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-status-exporter
  template:
    metadata:
      labels:
        app: k8s-status-exporter
    spec:
      serviceAccountName: k8s-status-exporter
      containers:
      - name: exporter
        image: docker-strategy-engine:latest
        imagePullPolicy: IfNotPresent
        command: ["python", "/script/exporter.py"]
        ports:
        - containerPort: 9309
        volumeMounts:
        - name: script
          mountPath: /script
        resources:
          requests: {memory: "32Mi", cpu: "20m"}
          limits: {memory: "128Mi", cpu: "100m"}
      volumes:
      - name: script
        configMap:
          name: k8s-status-exporter-script
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-status-exporter
  namespace: infrastructure
spec:
  ports:
  - port: 9309
    targetPort: 9309
  selector:
    app: k8s-status-exporter
