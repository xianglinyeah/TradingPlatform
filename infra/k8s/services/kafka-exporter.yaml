---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-exporter-script
  namespace: infrastructure
data:
  exporter.py: |
    """Kafka metrics exporter for Prometheus.
    Exposes topic offsets and consumer group lag on :9308/metrics.
    Runs inside the strategy-engine image (kafka-python 3.0.0 pre-installed).
    """
    import http.server
    import os
    import threading
    import time

    from kafka import KafkaAdminClient, KafkaConsumer, TopicPartition

    KAFKA = os.getenv("KAFKA_BROKERS", "kafka.infrastructure:9092")
    PORT = int(os.getenv("EXPORTER_PORT", "9308"))
    INTERVAL = int(os.getenv("SCRAPE_INTERVAL", "15"))

    _cached = "# initial collection in progress\n"

    def collect():
        """Query Kafka for topic offsets and consumer group lag."""
        global _cached
        lines = []
        try:
            admin = KafkaAdminClient(bootstrap_servers=KAFKA, request_timeout_ms=10000)
            consumer = KafkaConsumer(bootstrap_servers=KAFKA, request_timeout_ms=10000)

            topics = sorted(t for t in admin.list_topics() if not t.startswith("__"))

            topic_offset = []
            cg_offset = []
            lag = []

            for topic in topics:
                parts = consumer.partitions_for_topic(topic) or {0}
                tps = [TopicPartition(topic, p) for p in sorted(parts)]
                end_offsets = consumer.end_offsets(tps)

                for tp, end in end_offsets.items():
                    topic_offset.append(
                        f'kafka_topic_partition_current_offset{{topic="{tp.topic}",partition="{tp.partition}"}} {end}'
                    )

            groups = admin.list_groups()
            group_names = []
            for g in groups:
                if isinstance(g, dict):
                    group_names.append(g.get("group_id", ""))
                elif isinstance(g, str):
                    group_names.append(g)
                elif isinstance(g, (tuple, list)):
                    group_names.append(g[0])

            for gname in group_names:
                if not gname:
                    continue
                try:
                    raw = admin.list_group_offsets(gname)
                    # list_group_offsets returns {group_name: {TP: OffsetAndMetadata}}
                    if gname in raw:
                        offsets = raw[gname]
                    elif isinstance(raw, dict):
                        # Might be flat {TP: OffsetAndMetadata}
                        first_val = next(iter(raw.values()), None)
                        if hasattr(first_val, "offset"):
                            offsets = raw
                        else:
                            offsets = first_val if isinstance(first_val, dict) else {}
                    else:
                        offsets = {}

                    for tp, meta in offsets.items():
                        committed = meta.offset if hasattr(meta, "offset") else int(meta)
                        cg_offset.append(
                            f'kafka_consumergroup_current_offset{{topic="{tp.topic}",partition="{tp.partition}",consumergroup="{gname}"}} {committed}'
                        )
                        end = end_offsets.get(tp, committed)
                        l = max(0, int(end) - int(committed))
                        lag.append(
                            f'kafka_consumergroup_lag{{topic="{tp.topic}",partition="{tp.partition}",consumergroup="{gname}"}} {l}'
                        )
                except Exception as ex:
                    lines.append(f"# group {gname} error: {ex}")

            lines.append("# HELP kafka_topic_partition_current_offset Current latest offset per topic/partition")
            lines.append("# TYPE kafka_topic_partition_current_offset gauge")
            lines.extend(topic_offset)
            lines.append("# HELP kafka_consumergroup_current_offset Consumer group committed offset")
            lines.append("# TYPE kafka_consumergroup_current_offset gauge")
            lines.extend(cg_offset)
            lines.append("# HELP kafka_consumergroup_lag Consumer group lag (end_offset - committed_offset)")
            lines.append("# TYPE kafka_consumergroup_lag gauge")
            lines.extend(lag)

            consumer.close()
            admin.close()
        except Exception as e:
            lines.append(f"# collect error: {e}")

        _cached = "\n".join(lines) + "\n"

    class MetricsHandler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/metrics":
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; version=0.0.4; charset=utf-8")
                self.end_headers()
                self.wfile.write(_cached.encode())
            elif self.path == "/health":
                self.send_response(200)
                self.end_headers()
                self.wfile.write(b"ok")
            else:
                self.send_response(404)
                self.end_headers()

        def log_message(self, *a):
            pass

    def poll_loop():
        while True:
            try:
                collect()
            except Exception as e:
                print(f"[kafka-exporter] collect error: {e}", flush=True)
            time.sleep(INTERVAL)

    if __name__ == "__main__":
        print(f"[kafka-exporter] kafka={KAFKA} port={PORT} interval={INTERVAL}s", flush=True)
        collect()
        threading.Thread(target=poll_loop, daemon=True).start()
        http.server.HTTPServer(("0.0.0.0", PORT), MetricsHandler).serve_forever()

    class Handler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/metrics":
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; version=0.0.4")
                self.end_headers()
                self.wfile.write(cached.encode())
            else:
                self.send_response(404)
                self.end_headers()

        def log_message(self, *args):
            pass

    import threading

    def poll_loop():
        while True:
            collect()
            time.sleep(SCRAPE_INTERVAL)

    if __name__ == "__main__":
        print(f"[kafka-exporter] starting, kafka={KAFKA}, port={PORT}")
        collect()  # initial collection
        t = threading.Thread(target=poll_loop, daemon=True)
        t.start()
        print(f"[kafka-exporter] serving on :{PORT}/metrics")
        http.server.HTTPServer(("0.0.0.0", PORT), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
  template:
    metadata:
      labels:
        app: kafka-exporter
    spec:
      containers:
      - name: exporter
        image: docker-strategy-engine:latest
        imagePullPolicy: IfNotPresent
        command: ["python", "/script/exporter.py"]
        ports:
        - containerPort: 9308
        volumeMounts:
        - name: script
          mountPath: /script
        resources:
          requests: {memory: "64Mi", cpu: "50m"}
          limits: {memory: "256Mi", cpu: "200m"}
      volumes:
      - name: script
        configMap:
          name: kafka-exporter-script
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  namespace: infrastructure
spec:
  ports:
  - port: 9308
    targetPort: 9308
  selector:
    app: kafka-exporter
