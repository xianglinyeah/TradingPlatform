# Kafka UI for Kubernetes
# NodePort exposed: http://localhost:30301
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
      - name: kafka-ui
        image: provectuslabs/kafka-ui:latest
        ports:
        - containerPort: 8080
        env:
        - name: KAFKA_CLUSTERS_0_NAME
          value: "local"
        - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
          value: "kafka.infrastructure:9092"
        - name: KAFKA_CLUSTERS_0_ZOOKEEPER
          value: ""
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: infrastructure
spec:
  type: NodePort
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30301
  selector:
    app: kafka-ui
