# Dashboard.Service Deployment
# Image build: docker build -t docker-dashboard-service:latest lowfreq/python/dashboard-service/
#
# FastAPI backend that fronts ClickHouse / PostgreSQL / strategy-engine /
# market-data-replay for Dashboard.Web. Single replica is sufficient -
# the service is stateless; all state lives in PostgreSQL (dashboard.runs)
# and the downstream services.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
  namespace: trading-platform
  labels:
    app: dashboard-service
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-service
  template:
    metadata:
      labels:
        app: dashboard-service
        version: v1
    spec:
      containers:
      - name: dashboard-service
        image: docker-dashboard-service:latest
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8080
          name: http
          protocol: TCP

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3

        env:
        # HTTP server
        - name: DASHBOARD_HOST
          value: "0.0.0.0"
        - name: DASHBOARD_PORT
          value: "8080"
        - name: LOG_LEVEL
          value: "INFO"
        # Dashboard.Web is served by its own nginx pod; allow both the
        # nginx origin and direct Vite dev server for local debugging.
        - name: CORS_ALLOWED_ORIGINS
          value: "http://dashboard-web,http://localhost:5173,http://localhost:3000"

        # PostgreSQL (fundamentals, runs, orders)
        - name: PG_HOST
          value: "postgres.infrastructure"
        - name: PG_PORT
          value: "5432"
        - name: PG_DATABASE
          value: "dev"
        - name: PG_USER
          value: "dev_user"
        - name: PG_PASSWORD
          value: "dev_pass"

        # ClickHouse (klines). CH users.d removes `default`, only `dev_user`
        # exists with password dev_pass (see infra/k8s/services/clickhouse.yaml).
        - name: CH_HOST
          value: "clickhouse.infrastructure"
        - name: CH_PORT
          value: "8123"
        - name: CH_DATABASE
          value: "market_data"
        - name: CH_USER
          value: "dev_user"
        - name: CH_PASSWORD
          value: "dev_pass"

        # Downstream services (K8s DNS)
        - name: STRATEGY_ENGINE_URL
          value: "http://strategy-engine:8080"
        - name: MARKETDATA_REPLAY_URL
          value: "http://market-data-replay:8080"

        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        volumeMounts:
        - name: logs
          mountPath: /app/logs

      volumes:
      - name: logs
        emptyDir: {}

      restartPolicy: Always

---
# ClusterIP Service for Dashboard.Service.
# Dashboard.Web (nginx) proxies /api/ to this service.
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: trading-platform
  labels:
    app: dashboard-service
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: dashboard-service
