apiVersion: v1
kind: Service
metadata:
  name: execution-service
  namespace: trading-platform
  labels:
    app: execution-service
    version: v1
spec:
  type: LoadBalancer
  selector:
    app: execution-service
  ports:
    - name: grpc
      port: 8084
      targetPort: 8084
      protocol: TCP
    - name: metrics
      port: 8083
      targetPort: 8083
      protocol: TCP
