# Market data queue(s) to consume (Process A's per-venue output).
# md.queue.dirs takes a comma list for multi-venue (arb mode); md.queue.dir
# stays as the single-venue alias. Relative paths resolve from the working
# directory; override with -Dmd.queue.dirs=...
md.queue.dir=../marketdata-coinbase/queues/md-coinbase
#md.queue.dirs=../marketdata-coinbase/queues/md-coinbase,../marketdata-okx/queues/md-okx

# Strategy mode: imbalance (single-venue book imbalance, default) or arb
# (cross-venue basis mean-reversion; requires two queues + arb.symbol.*).
strategy.mode=imbalance

# Arb mode: logical symbol -> two legs (VENUE:PRODUCT,VENUE:PRODUCT).
#arb.symbol.BTC=COINBASE:BTC-USD,OKX:BTC-USDT
#arb.symbol.ETH=COINBASE:ETH-USD,OKX:ETH-USDT
# Enter when the spread deviates from its EMA by this many bps of mid.
# Known-losing vs ~70bps round-trip taker fees at current tiers — this
# strategy exists to exercise the two-leg pipeline, not to make money.
arb.entry-bps=3.0
# Half-life of the spread EMA (absorbs the persistent USDT/USD basis).
arb.ema-halflife-ms=60000
# EMA warmup: BOTH gates must pass before trading — a minimum sample count
# and a minimum EMA age (defaults to 2x the half-life; sample count alone
# was observed passing while the EMA was still ~40bps off the true basis).
arb.min-samples=200
#arb.ema-warmup-ms=120000
# Both legs' books must have updated within this window for a signal
# (a stale far leg makes the "spread" a timestamp artifact).
arb.max-leg-age-ms=500
# start = replay whole retained queue (rebuilds book state from the day's
# snapshots; converges to live). end = new documents only.
md.tail-from=start

# Imbalance signal: ratio = sum(top-N bid qty) / sum(top-N ask qty)
# BUY at ratio >= threshold, SELL at ratio <= 1/threshold.
imbalance.levels=5
imbalance.threshold=2.0
signal.cooldown-ms=2000
# Docs older than this update the book but never signal (replay/catchup guard)
signal.max-doc-age-ms=5000

# Execution sizing & pretrade risk. Everything is USD notional so limits are
# comparable across products; base qty is derived at the signal's touch price.
# Any of the notional keys takes a per-product override by appending the
# product id, e.g. order.notional-usd.ETH-USD=50 — products without an
# override use the default.
order.notional-usd=100
# Two-level order throttle: process-wide total, then per product.
risk.max-orders-per-minute=30
risk.max-orders-per-minute-per-product=15
# Max absolute net exposure per product, USD notional at touch price.
risk.max-abs-notional-usd=1000
orders.dir=orders

# Signal audit queue (this process is its single writer)
audit.queue.dir=queues/signals-audit

disruptor.ring-buffer-size=8192
metrics.stats-log-interval-ms=10000

# Time source: wall = system clock (live/paper trading, default).
# stream = docs' own recvTs (backtest replay of an archived queue): cooldown
# and risk windows follow historical time, doc-age gating is off, and
# draining the queue ends the run. Same binary either way.
clock.mode=wall

# Latency recording starts this long after the tailer reaches the live queue
# tail (excludes startup replay and JIT warmup from the cumulative histograms).
latency.warmup-ms=60000
# Shutdown latency report (percentile tables) is written here.
metrics.reports-dir=reports

# Simulated execution (paper trading). Orders fill by walking the local book
# sim.latency-ms AFTER the signal (imbalance predicts adverse moves — naive
# same-tick fills are systematically optimistic). Haircut scales displayed
# level size (you never get all you see). Fee = your actual taker tier;
# 60bps is the placeholder — check your Coinbase Advanced fee schedule.
# These two knobs (latency, haircut) are what real-money calibration tunes.
# Fee takes a per-venue override (venues differ widely): sim.fee-bps.<VENUE>.
sim.latency-ms=15
sim.fee-bps=60
sim.fee-bps.OKX=10
sim.size-haircut=0.5
