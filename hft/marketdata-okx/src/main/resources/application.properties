# OKX public WebSocket endpoint. Market data (books) needs no authentication —
# API keys only matter for private channels (orders/account), which live in
# the execution phase, not here.
okx.ws.url=wss://ws.okx.com:8443/ws/v5/public

# Comma-separated instrument IDs. NOTE: OKX spot quotes against USDT/USDC,
# not USD — BTC-USDT here is the liquidity twin of Coinbase's BTC-USD.
okx.product.ids=BTC-USDT,ETH-USDT

# OKX liveness is client-driven: we send a text "ping" on this interval and
# the server answers "pong" (unlike Coinbase's server-push heartbeats
# channel). The pong feeds the same RecoveryManager watchdog.
okx.ping-interval-ms=15000
okx.heartbeat.expected-interval-ms=15000
okx.heartbeat.missed-threshold=3

# Reconnect backoff (disconnect / heartbeat-timeout recovery)
okx.reconnect.initial-backoff-ms=1000
okx.reconnect.max-backoff-ms=30000

# Disruptor
disruptor.ring-buffer-size=8192
disruptor.wait-strategy=yielding

# OrderBook monitor
orderbook.snapshot-log-interval-ms=1000
orderbook.snapshot-log-depth=10

# Verify OKX's per-frame CRC32 book checksum (top-25 levels) after each
# apply; mismatch = corrupt replica -> STALE + resubscribe.
okx.checksum.enabled=true

# WS frame cap. OKX books snapshots are 400 levels (~100KB) — far smaller
# than Coinbase full-depth snapshots, but keep headroom.
okx.ws.max-frame-bytes=2097152

# Outbound proxy (optional). type = socks5 | http
okx.proxy.enabled=true
okx.proxy.type=socks5
okx.proxy.host=127.0.0.1
okx.proxy.port=10808

# Latency instrumentation
metrics.latency-log-interval-ms=10000

# Chronicle Queue publishing (per-venue queue, single writer).
venue=OKX
chronicle.publish.enabled=true
chronicle.queue.dir=queues/md-okx
